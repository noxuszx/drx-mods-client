#Create: Pillagers Arise structure generation settings.
#Restart the world or run /reload after changing these values.
[structures]

	[structures.cathedral_create]
		#Set to false to stop this structure from generating.
		enabled = true
		#Random spread spacing. Lower values generate more often; higher values generate less often.
		#Default: 600
		# Default: 600
		# Range: 1 ~ 4096
		spacing = 600
		#Minimum chunk separation. Must be lower than spacing; values too high are clamped at load time.
		#Default: 11
		# Default: 11
		# Range: 0 ~ 4095
		separation = 11

